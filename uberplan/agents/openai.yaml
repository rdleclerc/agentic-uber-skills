interface:
  display_name: "Uberplan"
  short_description: "Long-running goal plans before coding"
  default_prompt: "Use $uberplan only when explicitly invoked or routed by $ubergoal; do not auto-trigger from task similarity; create a long-running goal plan, not an uberslice or default 20-minute slice; return thread highlights plus a durable .md plan file; include a user expectation/surprise assessment before hardening the plan; for Tier 2/3 include a checkable PRD plus Mermaid task map; include a testing adaptation gate that stops before or at five consecutive clear failures or material unexpected failures, runs RCA, creates a focused child/sub-uberplan appendix when scope changes, appends or merges it into the parent plan, and resumes under ubergoal only after the new hypothesis and evidence gate are named; for agentic systems prove the Codex subagent skills/tools/context path before OpenClaw or target-runtime parity and require two parity proofs before readiness; activate only review lanes worth their cost; require benefit >> cost for complexity; run a pre-presentation over-orchestration review and confidence gate before implementation."
policy:
  allow_implicit_invocation: true
