interface:
  display_name: "Uberplan"
  short_description: "Rigorous lean planning before coding"
  default_prompt: "Use $uberplan only when explicitly invoked or routed by $ubergoal; do not auto-trigger from task similarity; create a lean plan contract; for Tier 2/3 include a checkable PRD plus Mermaid task map; for agentic systems enforce thin harness / fat agent and source-convention checks; activate only review lanes worth their cost; require benefit >> cost for complexity; run a confidence gate before implementation."
policy:
  allow_implicit_invocation: true
