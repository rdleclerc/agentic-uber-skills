<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Ubershow Questionnaire</title>
<style>:root{color-scheme:dark;--bg:#08111f;--panel:#111b2e;--text:#eef5ff;--muted:#a5b4d4;--line:#2b3e60;--accent:#7dd3fc;--violet:#c4b5fd}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 10% 0,#164e6355,transparent 35%),var(--bg);color:var(--text);font:15px/1.5 ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif}main{max-width:1040px;margin:auto;padding:28px}.hero,fieldset,section{border:1px solid var(--line);border-radius:18px;background:#111b2edd;padding:18px;margin:14px 0}legend{font-weight:850;font-size:20px}label{display:block;padding:10px;border:1px solid var(--line);border-radius:12px;margin:8px 0;cursor:pointer}.muted{color:var(--muted)}textarea{width:100%;min-height:80px;background:#050914;color:var(--text);border:1px solid var(--line);border-radius:12px;padding:10px}pre{white-space:pre-wrap;background:#050914;border:1px solid var(--line);border-radius:12px;padding:12px}button{border:0;border-radius:12px;background:var(--accent);color:#03101a;font-weight:800;padding:10px 14px}</style></head>
<body><main data-artifact-kind="ubershow-questionnaire" data-ubershow-template="questionnaire">
<header class="hero"><p class="muted">Questionnaire · generated view</p><h1>Human decision capture</h1><p>Use when the agent needs several choices. The answer receipt is pasted back into Codex/Claude.</p></header>
<fieldset><legend>Scope</legend><label><input type="radio" name="scope" value="smallest useful slice" checked> Smallest useful slice</label><label><input type="radio" name="scope" value="full implementation"> Full implementation</label><label><input type="radio" name="scope" value="research only"> Research only</label></fieldset>
<fieldset><legend>Risk tolerance</legend><label><input type="radio" name="risk" value="safe/local only" checked> Safe/local only</label><label><input type="radio" name="risk" value="can touch live systems with approval"> Can touch live systems with approval</label></fieldset>
<section><h2>Notes</h2><textarea id="notes">Add any constraints or preferences here.</textarea><pre id="decision-receipt"></pre><button onclick="copyDecisionReceipt(this)">Copy answers for Codex/Claude</button></section>
</main><script>function val(name){return document.querySelector(`input[name="${name}"]:checked`)?.value||'UNANSWERED'}function buildReceipt(){document.getElementById('decision-receipt').textContent=`Decision receipt\nArtifact: ubershow-questionnaire\nScope: ${val('scope')}\nRisk tolerance: ${val('risk')}\nNotes: ${document.getElementById('notes').value.trim()}\nMarkdown receipt: Update the sibling Markdown receipt with this confirmed choice.
Next action: agent should record these answers in the session log and proceed within constraints.`}async function copyDecisionReceipt(b){buildReceipt();const t=document.getElementById('decision-receipt').textContent;try{await navigator.clipboard.writeText(t);const o=b.textContent;b.textContent='Copied';setTimeout(()=>b.textContent=o,1200)}catch(e){prompt('Copy this receipt:',t)}}document.querySelectorAll('input,textarea').forEach(el=>el.addEventListener('input',buildReceipt));buildReceipt();</script></body></html>
