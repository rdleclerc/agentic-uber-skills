interface:
  display_name: "Uber Skill Creator"
  short_description: "Create, migrate, or evaluate a portable skill"
  default_prompt: "Use $uber-skill-creator when creating, updating, migrating, deprecating, or evaluating portable SKILL.md skills for Codex, Claude, or compatible coding agents, including legacy local skill-creator/skill-creator-pro alias cleanup. Pick the target profile first; keep skills concise, progressively disclosed, and runtime-neutral; prefer openclaw-agentic-skill-creator for OpenClaw/Gaia/Type0/Soho-specific skills; use scripts/references/assets only when they reduce repeated work or improve reliability. For existing skills, start evaluation mode with the read-only quality report before recommending broad rewrites. For non-trivial skills run the eval-driven extension with intent examples, eval prompts, with/without-skill comparison when feasible, an HTML review report, and trigger-description tuning; use uberskillevolver after real runs to promote lessons into evidence-backed changes."
  icon_small: "./assets/uber-skill-creator-small.svg"
  icon_large: "./assets/uber-skill-creator.png"
policy:
  allow_implicit_invocation: true
