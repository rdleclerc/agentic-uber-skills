interface:
  display_name: "Deep RCA"
  short_description: "Class-level root cause analysis"
  default_prompt: "Use $deep-rca when investigating incidents, repeated bugs, stuck loops, repeated clear test failures, agentic-system failures, suspicious edge cases, or when a proposed fix may only address a proximate cause. Build an evidence-backed RCA ladder, run the self-challenge loop, stop at the deepest actionable invariant, and map durable fixes to the lowest enforceable layer before proposing non-mitigation patches."
policy:
  allow_implicit_invocation: true
