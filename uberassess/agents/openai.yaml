interface:
  display_name: "Uberassess"
  short_description: "Assess sources, plans, ideas, and research questions before adoption"
  default_prompt: "route to $uberarchitect before adoption recommendations for system-scale concurrency, queue/worker, gateway, orchestration, backpressure, repeated-timeout, or symptom-patching questions, Use $uberassess only when explicitly invoked, when I ask to assess or deeply research an external source, draft plan, artifact, idea seed, open research question, or implementation question for adoption, or when routed by $ubergoal; do not auto-trigger from task similarity; ask targeted clarification questions when ambiguity would materially change broad research, then produce a source-grounded recommendation packet with an honest research/source map, alternatives, benefit >> cost, implementation behind approval, and approved work handed to $ubergoal/$uberplan."
policy:
  allow_implicit_invocation: true
