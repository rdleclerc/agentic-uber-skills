interface:
  display_name: "Uberarchitect"
  short_description: "Architecture stepback before micro-patches"
  default_prompt: "Use $uberarchitect only when explicitly invoked or routed by $ubergoal, $uberassess, $uberplan, or $uberaccept; do not auto-trigger from task similarity; for concurrency, scaling, queue/worker, long-running job, gateway, orchestration, backpressure, repeated-timeout, or symptom-patching failures, stop local patching and produce an Architecture Stepback Packet: plain-English diagnosis, system class, normal industry architecture, fresh-start architecture, current mismatch, symptom patches demoted, smallest transition path, proof gate, and human counterfactual."
policy:
  allow_implicit_invocation: true
