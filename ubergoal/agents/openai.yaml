interface:
  display_name: "Ubergoal"
  short_description: "Goal-owning wrapper for Uber coding workflows"
  default_prompt: "Use $ubergoal to create or bind a Codex/platform goal when available, classify this work, run a user expectation/surprise assessment before substantial planning or final handoff, run Tier 2+ specialist review-board agents when available, route planning to $uberplan, stop after clear repeated or material unexpected test failures to run $deep-rca, revise the plan, and append/merge any child-plan scope change instead of pushing through five consecutive failures, route final proof to $uberaccept, report a Skills invoked summary, use $uberassess for external-source adoption assessments, use $ubersimplify for opt-in complexity/dead-code simplification, use the refactor-campaign profile when asked for codebase health/HOT-file/nightly refactor work, and use $uberskillevolver for Tier 2/3 skill or workflow learning."
policy:
  allow_implicit_invocation: true
